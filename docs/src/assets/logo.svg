<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Filters for Depth/Shadow -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradients for Julia Colors -->
    <!-- Purple -->
    <radialGradient id="grad-purple" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#b57fe3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9558B2;stop-opacity:1" />
    </radialGradient>

    <!-- Red -->
    <radialGradient id="grad-red" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#e65c53;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CB3C33;stop-opacity:1" />
    </radialGradient>

    <!-- Green -->
    <radialGradient id="grad-green" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#5cb84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#389826;stop-opacity:1" />
    </radialGradient>

    <!-- Blue -->
    <radialGradient id="grad-blue" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#6b8cf7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4063D8;stop-opacity:1" />
    </radialGradient>

    <!-- Arrow Marker -->
    <marker id="arrowhead" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 5 2.5, 0 5" fill="#4063D8" />
    </marker>
  </defs>

  <!-- Background Container (White rounded rect) -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Main Content Group: Three network frames showing evolution -->
  <g transform="translate(0, -30)">

    <!-- Frame 1: Sparse network (left) -->
    <g transform="translate(60, 80)">
      <!-- Edges -->
      <line x1="40" y1="45" x2="85" y2="25" stroke="#aaaaaa" stroke-width="4" stroke-linecap="round"/>
      <!-- Nodes -->
      <circle cx="30" cy="50" r="18" fill="url(#grad-purple)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
      <circle cx="95" cy="20" r="18" fill="url(#grad-red)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
      <circle cx="65" cy="100" r="18" fill="url(#grad-green)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
    </g>

    <!-- Motion arrow 1→2 -->
    <path d="M 180 130 L 210 130" stroke="#4063D8" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>

    <!-- Frame 2: Growing network (center) -->
    <g transform="translate(210, 80)">
      <!-- Edges -->
      <line x1="35" y1="45" x2="80" y2="25" stroke="#aaaaaa" stroke-width="4" stroke-linecap="round"/>
      <line x1="35" y1="55" x2="55" y2="90" stroke="#aaaaaa" stroke-width="4" stroke-linecap="round"/>
      <line x1="75" y1="95" x2="100" y2="70" stroke="#aaaaaa" stroke-width="4" stroke-linecap="round"/>
      <!-- Nodes -->
      <circle cx="25" cy="50" r="18" fill="url(#grad-purple)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
      <circle cx="90" cy="20" r="18" fill="url(#grad-red)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
      <circle cx="60" cy="100" r="18" fill="url(#grad-green)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
      <circle cx="110" cy="75" r="15" fill="url(#grad-blue)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
    </g>

    <!-- Motion arrow 2→3 -->
    <path d="M 340 130 L 370 130" stroke="#4063D8" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>

    <!-- Frame 3: Dense network (right) -->
    <g transform="translate(355, 80)">
      <!-- Edges -->
      <line x1="25" y1="45" x2="70" y2="25" stroke="#aaaaaa" stroke-width="4" stroke-linecap="round"/>
      <line x1="25" y1="55" x2="45" y2="90" stroke="#aaaaaa" stroke-width="4" stroke-linecap="round"/>
      <line x1="65" y1="95" x2="90" y2="70" stroke="#aaaaaa" stroke-width="4" stroke-linecap="round"/>
      <line x1="85" y1="28" x2="95" y2="60" stroke="#aaaaaa" stroke-width="4" stroke-linecap="round"/>
      <line x1="75" y1="30" x2="55" y2="85" stroke="#aaaaaa" stroke-width="3" stroke-linecap="round" stroke-dasharray="8,4"/>
      <!-- Nodes -->
      <circle cx="15" cy="50" r="18" fill="url(#grad-purple)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
      <circle cx="80" cy="20" r="18" fill="url(#grad-red)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
      <circle cx="50" cy="100" r="18" fill="url(#grad-green)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
      <circle cx="100" cy="70" r="15" fill="url(#grad-blue)" stroke="#ffffff" stroke-width="3" filter="url(#dropShadow)"/>
    </g>

    <!-- Timeline bar -->
    <g transform="translate(60, 230)">
      <rect x="0" y="0" width="392" height="8" rx="4" fill="#e0e0e0"/>
      <rect x="0" y="0" width="98" height="8" rx="4" fill="#9558B2"/>
      <rect x="130" y="0" width="98" height="8" rx="4" fill="#CB3C33"/>
      <rect x="260" y="0" width="132" height="8" rx="4" fill="#389826"/>

      <!-- Timeline markers -->
      <circle cx="0" cy="4" r="8" fill="#9558B2"/>
      <circle cx="196" cy="4" r="8" fill="#CB3C33"/>
      <circle cx="392" cy="4" r="8" fill="#389826"/>

      <!-- Time labels -->
      <text x="0" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#999999">t=0</text>
      <text x="196" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#999999">t=50</text>
      <text x="392" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#999999">t=100</text>
    </g>
  </g>

  <!-- Text "NDTV.jl" -->
  <g transform="translate(256, 450)" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="80" letter-spacing="2">
    <!-- N: Purple -->
    <text x="-135" y="0" fill="#9558B2" filter="url(#dropShadow)">N</text>
    <!-- D: Red -->
    <text x="-75" y="0" fill="#CB3C33" filter="url(#dropShadow)">D</text>
    <!-- T: Green -->
    <text x="-20" y="0" fill="#389826" filter="url(#dropShadow)">T</text>
    <!-- V: Blue -->
    <text x="35" y="0" fill="#4063D8" filter="url(#dropShadow)">V</text>
    <!-- .: Dark Grey -->
    <text x="85" y="0" fill="#555555">.</text>
    <!-- j: Purple -->
    <text x="105" y="0" fill="#9558B2" filter="url(#dropShadow)">j</text>
    <!-- l: Red -->
    <text x="135" y="0" fill="#CB3C33" filter="url(#dropShadow)">l</text>
  </g>

</svg>
